<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7662489362586460" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Euclidean Geometry Problems</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA (홈 화면에 추가 시 주소창 없이 전체 화면) -->
    <link rel="manifest" href="/euclide-geometry/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Euclid">
    <meta name="theme-color" content="#2F4F4F">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="../css/login-modal.css">
    
    <!-- Import Map for Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
    }
    </script>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.469.0"></script>

</head>
<body>
    <div id="bg-container"></div>
    <script type="module" src="js/background-effect.js"></script>

    <header class="top-nav">
        <a href="../" class="nav-logo">
            <span>MathMore</span>
        </a>

        <!-- 필터 -->
        <div class="filters">
            <select id="level-filter">
                <option value="">모든 레벨</option>
                <option value="mid2">중2</option>
                <option value="mid3">중3</option>
                <option value="contest1-1">경시 1차-1</option>
                <option value="contest1-2">경시 1차-2</option>
                <option value="contest2">경시2차</option>
                <option value="gifted">영재고</option>
                <option value="0">기본정리</option>
            </select>
        
            <select id="category-filter">
                <option value="">모든 카테고리</option>
            </select>
        </div>

        <div class="auth-buttons">
            <button id="login-btn" onclick="openLoginModal()" style="display: none;">로그인</button>
            <button id="logout-btn" onclick="signOut()" style="display: none;">로그아웃</button>
        </div>
    </header>

    <div class="problem-list-container">
        <!-- 문제 그리드 -->
        <div id="problem-grid"></div>

        <!-- 페이지네이션 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Supabase, Auth & Payment -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/payment.js"></script>
    <script type="module" src="js/index.js"></script>
</body>
</html>
