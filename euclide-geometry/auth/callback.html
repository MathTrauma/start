<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euclide Geometry - 인증 처리 중</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Noto Sans KR', sans-serif;
            background-color: #f5efe3;
            color: #5a5247;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .callback-container { text-align: center; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(139, 125, 107, 0.3);
            border-top-color: #8b7d6b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #8b7d6b; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="spinner"></div>
        <p>인증 처리 중...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://bdunrluoivhgypwangcx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdW5ybHVvaXZoZ3lwd2FuZ2N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNjc1NTksImV4cCI6MjA4Mjg0MzU1OX0.JBkLVuR8RyOmwMl6_-KPIgsYBy1_qoG90v5j_vt0mSQ';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleCallback() {
            const { data: { session }, error } = await sb.auth.getSession();
            if (error) console.error('Auth callback error:', error);

            const redirectPath = localStorage.getItem('euclide_redirect') || '/euclide-geometry/index.html';
            localStorage.removeItem('euclide_redirect');

            const authBase = window.location.pathname.replace(/[^/]*$/, '');
            window.location.href = authBase + 'gate.html?redirect=' + encodeURIComponent(redirectPath);
        }

        handleCallback();
    </script>
</body>
</html>
