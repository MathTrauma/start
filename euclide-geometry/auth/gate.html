<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euclide Geometry - 인증</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Noto Sans KR', sans-serif;
            background-color: #f5efe3;
            color: #5a5247;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .gate-container {
            background-color: #fff;
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(90, 82, 71, 0.15);
        }
        .gate-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            color: #8b7d6b;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #5a5247;
        }
        .gate-desc {
            color: #8b7d6b;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .login-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .btn-oauth {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-oauth svg { width: 20px; height: 20px; flex-shrink: 0; }
        .btn-google { background-color: #fff; color: #333; border: 1px solid #d4cec3; }
        .btn-google:hover { background-color: #f0f0f0; }
        .btn-kakao { background-color: #FEE500; color: #191919; }
        .btn-kakao:hover { background-color: #e6cf00; }

        .btn-purchase {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: linear-gradient(135deg, #a89678, #8b7d6b);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-purchase:hover { opacity: 0.9; }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(139, 125, 107, 0.3);
            border-top-color: #8b7d6b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="gate-container">
        <!-- 로딩 -->
        <div id="loading">
            <svg class="gate-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <h1>Euclide Geometry</h1>
            <p class="gate-desc">콘텐츠 접근 권한을 확인하고 있습니다...</p>
            <div class="spinner"></div>
        </div>

        <!-- 로그인 필요 -->
        <div id="login-needed" class="hidden">
            <svg class="gate-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <h1>로그인이 필요합니다</h1>
            <p class="gate-desc">이 문제는 유료 회원 전용입니다.<br>로그인 후 이용해주세요.</p>
            <div class="login-buttons">
                <button class="btn-oauth btn-google" onclick="signInWithGoogle()">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google 로그인
                </button>
                <button class="btn-oauth btn-kakao" onclick="signInWithKakao()">
                    <svg viewBox="0 0 24 24">
                        <path fill="#191919" d="M12 3c-5.5 0-10 3.58-10 8 0 2.63 1.74 4.95 4.38 6.32-.19.71-.69 2.58-.79 2.98-.12.49.18.48.38.35.16-.1 2.5-1.7 3.51-2.38.82.13 1.67.2 2.52.2 5.5 0 10-3.58 10-8s-4.5-8-10-8z"/>
                    </svg>
                    카카오 로그인
                </button>
            </div>
        </div>

        <!-- 구매 필요 -->
        <div id="purchase-needed" class="hidden">
            <svg class="gate-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <h1>이용권이 필요합니다</h1>
            <p class="gate-desc">
                이 문제를 이용하려면<br>
                <strong>MathMore 이용권</strong>이 필요합니다.
            </p>
            <a href="/#pricing" class="btn-purchase">이용권 구매하기</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://bdunrluoivhgypwangcx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdW5ybHVvaXZoZ3lwd2FuZ2N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNjc1NTksImV4cCI6MjA4Mjg0MzU1OX0.JBkLVuR8RyOmwMl6_-KPIgsYBy1_qoG90v5j_vt0mSQ';
        const PAYMENT_WORKER_URL = 'https://payment-worker.painfultrauma.workers.dev';

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const params = new URLSearchParams(window.location.search);
        const redirectPath = params.get('redirect') || '/euclide-geometry/index.html';
        const authBase = window.location.pathname.replace(/[^/]*$/, '');

        function show(id) {
            document.querySelectorAll('.gate-container > div').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function getCookieValue(name) {
            const match = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]*)'));
            return match ? decodeURIComponent(match[1]) : null;
        }

        function setTokenCookie(token) {
            const maxAge = 3600;
            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const secure = isLocal ? '' : '; Secure';
            if (!isLocal) {
                document.cookie = `mt_session=${encodeURIComponent(token)}; domain=.mathtrauma.com; path=/; max-age=${maxAge}; Secure; SameSite=Lax`;
            } else {
                document.cookie = `mt_session=${encodeURIComponent(token)}; path=/; max-age=${maxAge}; SameSite=Lax`;
            }
        }

        async function checkAccessByToken(token) {
            try {
                const res = await fetch(`${PAYMENT_WORKER_URL}/check-access`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (!res.ok) return false;
                const data = await res.json();
                return data.hasAccess === true;
            } catch (e) {
                console.error('Access check failed:', e);
                return false;
            }
        }

        async function handleSession(session) {
            const hasAccess = await checkAccessByToken(session.access_token);
            if (hasAccess) {
                setTokenCookie(session.access_token);
                window.location.href = redirectPath;
                return;
            }
            show('purchase-needed');
        }

        async function handleToken(token) {
            const hasAccess = await checkAccessByToken(token);
            if (hasAccess) {
                setTokenCookie(token);
                window.location.href = redirectPath;
                return;
            }
            show('purchase-needed');
        }

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) return await handleSession(session);
            const cookieToken = getCookieValue('mt_session');
            if (cookieToken) return await handleToken(cookieToken);
            show('login-needed');
        }

        function signInWithGoogle() {
            localStorage.setItem('euclide_redirect', redirectPath);
            sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + authBase + 'callback.html' }
            });
        }

        function signInWithKakao() {
            localStorage.setItem('euclide_redirect', redirectPath);
            sb.auth.signInWithOAuth({
                provider: 'kakao',
                options: { redirectTo: window.location.origin + authBase + 'callback.html' }
            });
        }

        init();
    </script>
</body>
</html>
