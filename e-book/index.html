<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7662489362586460" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphic Novel — Math More</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #f3f6fb;
        color: #20303f;
        font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100vh;
    }
    .gn-header {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 24px 24px;
    }
    .gn-header a.home {
        color: #5a7894;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
    }
    .gn-header a.home:hover { text-decoration: underline; }
    .gn-header h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2.4rem;
        color: #14304d;
        margin: 14px 0 6px;
    }
    .gn-header p { color: #6b8298; font-size: 1.02rem; }

    .book-grid {
        max-width: 920px;
        margin: 0 auto;
        padding: 16px 24px 80px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 22px;
    }
    .book-card {
        display: flex;
        flex-direction: column;
        background: #fff;
        border: 1px solid #e0e7f0;
        border-radius: 12px;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        transition: transform 0.18s, box-shadow 0.18s;
    }
    .book-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 28px rgba(20, 48, 77, 0.14);
    }
    .book-cover {
        height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3.4rem;
    }
    .cover-leuko { background: linear-gradient(135deg, #ffd0d6, #f4889a); }
    .cover-chloro { background: linear-gradient(135deg, #c8f0cf, #5cb878); }
    .book-meta { padding: 16px 18px 20px; }
    .book-meta h2 { font-size: 1.18rem; color: #14304d; margin-bottom: 6px; }
    .book-meta p { color: #6b8298; font-size: 0.92rem; }
    .book-tag {
        display: inline-block;
        margin-top: 12px;
        font-size: 0.78rem;
        font-weight: 600;
        color: #5a7894;
        border: 1px solid #cdd9e6;
        border-radius: 20px;
        padding: 3px 10px;
    }
    </style>
</head>
<body>
    <header class="gn-header">
        <a class="home" href="/">← Math More</a>
        <h1>Graphic Novel</h1>
        <p>과학 이야기를 그래픽 노블로 풀어냅니다.</p>
    </header>

    <main class="book-grid">
        <a class="book-card" href="./1-leukocyte.html">
            <div class="book-cover cover-leuko">🩸</div>
            <div class="book-meta">
                <h2>백혈구 이야기</h2>
                <p>몸속을 지키는 면역 세포의 모험.</p>
                <span class="book-tag">웹툰 뷰어</span>
            </div>
        </a>

        <a class="book-card" href="./_The_Chlorophyll_Factory.pdf" target="_blank" rel="noopener">
            <div class="book-cover cover-chloro">🌿</div>
            <div class="book-meta">
                <h2>The Chlorophyll Factory</h2>
                <p>엽록소 공장에서 벌어지는 광합성 이야기.</p>
                <span class="book-tag">PDF</span>
            </div>
        </a>
    </main>
</body>
</html>
