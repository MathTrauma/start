<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백혈구 이야기</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .book-back {
        align-self: flex-start;
        margin: 14px 0 0 16px;
        color: #1a3c5e;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 600;
    }
    .book-back:hover { text-decoration: underline; }

    body {
        background: #d6eaf8;
        color: #2c3e50;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 { margin-top: 1.2rem; font-size: 2.2rem; margin-bottom: 0.8rem; color: #1a3c5e; }

    .pdf-controls {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 10px 20px;
        background: rgba(214, 234, 248, 0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid #aed6f1;
        width: 100%;
    }

    .pdf-controls button {
        padding: 6px 16px;
        background: #aed6f1;
        color: #2c3e50;
        border: 1px solid #85c1e9;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.15s, color 0.15s;
    }
    .pdf-controls button:hover:not(:disabled) {
        background: #85c1e9;
        color: #1a5276;
    }
    .pdf-controls button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
    }

    .page-info {
        font-size: 14px;
        color: #5d6d7e;
        min-width: 80px;
        text-align: center;
    }

    .page-input {
        width: 48px;
        padding: 4px 6px;
        background: #eaf2f8;
        color: #2c3e50;
        border: 1px solid #aed6f1;
        border-radius: 4px;
        text-align: center;
        font-size: 14px;
    }
    .page-input:focus { outline: none; border-color: #3498db; }

    .zoom-controls {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-left: 12px;
        padding-left: 12px;
        border-left: 1px solid #aed6f1;
    }

    .zoom-label {
        font-size: 13px;
        color: #5d6d7e;
        min-width: 40px;
        text-align: center;
    }

    .pdf-viewer {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        gap: 16px;
        width: 100%;
        overflow-y: auto;
    }

    .pdf-viewer canvas {
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        border-radius: 2px;
        max-width: 100%;
        height: auto !important;
    }

    .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 60vh;
        font-size: 1.1rem;
        color: #5d6d7e;
    }

    .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #aed6f1;
        border-top-color: #3498db;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
        .pdf-controls { gap: 6px; padding: 8px 10px; }
        .pdf-controls button { padding: 6px 10px; font-size: 13px; }
        .zoom-controls { margin-left: 6px; padding-left: 6px; }
        .pdf-viewer { padding: 10px; }
        h1 { font-size: 1.1rem; }
    }
    </style>
</head>

<body>
    <a class="book-back" href="./index.html">← 목록으로</a>
    <h1>백혈구 이야기</h1>

    <div class="pdf-controls">
        <button id="prevBtn" disabled>&#9664;</button>
        <button id="nextBtn" disabled>&#9654;</button>
        <input class="page-input" id="pageInput" type="number" min="1" value="1">
        <span class="page-info" id="pageInfo">/ —</span>
        <div class="zoom-controls">
            <button id="zoomOut">−</button>
            <span class="zoom-label" id="zoomLabel">100%</span>
            <button id="zoomIn">+</button>
            <button id="zoomFit">맞춤</button>
        </div>
    </div>

    <div class="pdf-viewer" id="viewer">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            PDF 로딩 중…
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const PDF_URL = 'leukocyte_final.pdf';

    const viewer = document.getElementById('viewer');
    const loading = document.getElementById('loading');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageInput = document.getElementById('pageInput');
    const pageInfo = document.getElementById('pageInfo');
    const zoomInBtn = document.getElementById('zoomIn');
    const zoomOutBtn = document.getElementById('zoomOut');
    const zoomFitBtn = document.getElementById('zoomFit');
    const zoomLabel = document.getElementById('zoomLabel');

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let scale = 1.0;
    let baseScale = 1.0;
    let rendering = false;

    function calcFitScale(page) {
        const vp = page.getViewport({ scale: 1 });
        const maxW = viewer.clientWidth - 40;
        const maxH = window.innerHeight - 120;
        const scaleW = maxW / vp.width;
        const scaleH = maxH / vp.height;
        return Math.min(scaleW, scaleH);
    }

    async function renderPage(num) {
        if (rendering) return;
        rendering = true;

        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale });

        let canvas = document.getElementById('pdf-canvas');
        if (!canvas) {
            canvas = document.createElement('canvas');
            canvas.id = 'pdf-canvas';
            viewer.appendChild(canvas);
        }

        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = viewport.width * dpr;
        canvas.height = viewport.height * dpr;
        canvas.style.width = viewport.width + 'px';
        canvas.style.height = viewport.height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        await page.render({ canvasContext: ctx, viewport }).promise;

        currentPage = num;
        pageInput.value = num;
        pageInfo.textContent = `/ ${totalPages}`;
        prevBtn.disabled = num <= 1;
        nextBtn.disabled = num >= totalPages;
        rendering = false;
    }

    function updateZoomLabel() {
        zoomLabel.textContent = Math.round((scale / baseScale) * 100) + '%';
    }

    async function init() {
        pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
        totalPages = pdfDoc.numPages;
        pageInput.max = totalPages;
        loading.remove();

        const firstPage = await pdfDoc.getPage(1);
        baseScale = calcFitScale(firstPage);
        scale = baseScale;
        updateZoomLabel();

        await renderPage(1);
    }

    prevBtn.addEventListener('click', () => {
        if (currentPage > 1) renderPage(currentPage - 1);
    });
    nextBtn.addEventListener('click', () => {
        if (currentPage < totalPages) renderPage(currentPage + 1);
    });

    pageInput.addEventListener('change', () => {
        const p = parseInt(pageInput.value);
        if (p >= 1 && p <= totalPages) renderPage(p);
        else pageInput.value = currentPage;
    });
    pageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') pageInput.blur();
    });

    zoomInBtn.addEventListener('click', () => {
        scale = Math.min(scale * 1.25, baseScale * 3);
        updateZoomLabel();
        renderPage(currentPage);
    });
    zoomOutBtn.addEventListener('click', () => {
        scale = Math.max(scale / 1.25, baseScale * 0.5);
        updateZoomLabel();
        renderPage(currentPage);
    });
    zoomFitBtn.addEventListener('click', async () => {
        const page = await pdfDoc.getPage(currentPage);
        baseScale = calcFitScale(page);
        scale = baseScale;
        updateZoomLabel();
        renderPage(currentPage);
    });

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault();
            if (currentPage > 1) renderPage(currentPage - 1);
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
            e.preventDefault();
            if (currentPage < totalPages) renderPage(currentPage + 1);
        }
    });

    window.addEventListener('resize', async () => {
        if (!pdfDoc) return;
        const page = await pdfDoc.getPage(currentPage);
        baseScale = calcFitScale(page);
        scale = baseScale;
        updateZoomLabel();
        renderPage(currentPage);
    });

    init().catch(err => {
        loading.innerHTML = '<span style="color:#ff6b6b">PDF 로딩 실패: ' + err.message + '</span>';
    });
    </script>
</body>
</html>
